<main class="container page-space">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="form-card">

        <h1 class="page-title">Solicitar una pista</h1>
        <p class="page-subtitle">Completa estos datos y se abrirá WhatsApp con el mensaje listo para enviar.</p>

        <form id="formSolicitud">
          <div class="mb-3">
            <label class="form-label">Tu nombre</label>
            <input type="text" id="nombre" class="form-control custom-input" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Nombre de la canción</label>
            <input type="text" id="cancion" class="form-control custom-input" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Artista o grupo de referencia</label>
            <input type="text" id="artista" class="form-control custom-input">
          </div>

          <div class="mb-3">
            <label class="form-label">Género</label>
            <select id="genero" class="form-control custom-input">
              <option>Cumbia Chicha</option>
              <option>Cumbia Sureña</option>
              <option>Cumbia con Sabor</option>
              <option>Otros Ritmos</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Observación</label>
            <textarea id="observacion" class="form-control custom-input" rows="4" placeholder="Ejemplo: la quiero en tono bajo, para cantar en vivo, con intro larga, etc."></textarea>
          </div>

          <button type="submit" class="btn-main w-100 justify-content-center">
            <i class="bi bi-whatsapp"></i>
            Enviar solicitud por WhatsApp
          </button>
        </form>

      </div>
    </div>
  </div>
</main>

<footer class="footer text-center">
  <div class="container">
